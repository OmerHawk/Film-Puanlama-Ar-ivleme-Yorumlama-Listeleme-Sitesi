</h2>
<p class="text-on-surface-variant font-body text-sm leading-relaxed">

                    </p>

                            I agree to the <a class="text-secondary hover:text-primary underline underline-offset-4 decoration-secondary/30 transition-colors" href="#">Terms of Service</a> and <a class="text-secondary hover:text-primary underline underline-offset-4 decoration-secondary/30 transition-colors" href="#">Privacy Policy</a>.

<span class="material-symbols-outlined text-outline text-lg hover:text-primary cursor-pointer transition-colors" data-icon="help_outline">help_outline</span>
